<div class="auth-hero">
  <div class="auth-hero-overlay"></div>
  <div class="auth-hero-content">
    <h1 class="auth-hero-title">Editar Perfil</h1>
  </div>
  <div class="hero-wave">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,60 C360,120 1080,0 1440,60 L1440,120 L0,120 Z" />
    </svg>
  </div>
</div>

<main class="auth-main">
  <div class="auth-card">
    <div class="auth-alert auth-error" *ngIf="error">{{ error }}</div>

    <form class="auth-form" (ngSubmit)="onSubmit()" #profileForm="ngForm">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            [(ngModel)]="client.nombre"
            required
          />
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input
            type="text"
            id="apellido"
            name="apellido"
            [(ngModel)]="client.apellido"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="correo">Correo</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="client.correo"
          required
        />
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input
          type="text"
          id="telefono"
          name="telefono"
          [(ngModel)]="client.telefono"
          required
        />
      </div>

      <div class="form-group">
        <label for="direccion">Dirección</label>
        <input
          type="text"
          id="direccion"
          name="direccion"
          [(ngModel)]="client.direccion"
          required
        />
      </div>

      <button type="submit" class="auth-btn" [disabled]="profileForm.invalid">
        Guardar Cambios
      </button>
      <button type="button" class="auth-btn btn-secondary" (click)="onCancel()">
        Cancelar
      </button>
    </form>
  </div>
</main>
