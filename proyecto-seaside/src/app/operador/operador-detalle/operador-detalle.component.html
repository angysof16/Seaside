<div class="detalle-card" *ngIf="seleccionado">
  <div class="detalle-body">
    <h3 class="detalle-nombre">{{ seleccionado.nombre }}</h3>
    <div class="detalle-grid">
      <div class="detalle-item">
        <span class="detalle-label">ID</span>
        <span class="detalle-value">{{ seleccionado.id }}</span>
      </div>

      <div class="detalle-item">
        <span class="detalle-label">Usuario</span>
        <span class="detalle-value">{{ seleccionado.usuario }}</span>
      </div>

      <div class="detalle-item full">
        <span class="detalle-label">Contraseña</span>
        <span class="detalle-value">••••••••</span>
      </div>
    </div>
  </div>
</div>
