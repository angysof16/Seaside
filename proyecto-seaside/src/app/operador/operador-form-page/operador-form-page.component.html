<div class="form-page-wrapper">
  <div class="form-page-header">
    <div>
      <h1 class="admin-title">
        {{ modoEdicion ? "Editar Operador" : "Nuevo Operador" }}
      </h1>
      <p class="admin-subtitle">
        {{
          modoEdicion
            ? "Modifica los datos del operador"
            : "Completa los datos para registrar un operador"
        }}
      </p>
    </div>
    <a class="btn-back" routerLink="/operadores">← Volver a operadores</a>
  </div>

  <section class="form-section">
    <app-operador-form
      [operadorEditar]="operadorEditar"
      (addOperadorEvent)="onGuardar($event)"
      (updateOperadorEvent)="onActualizar($event)"
      (cancelarEvent)="onCancelar()"
    ></app-operador-form>
  </section>
</div>
