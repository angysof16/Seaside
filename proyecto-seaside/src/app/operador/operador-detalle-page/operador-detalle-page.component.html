<div class="detalle-page-wrapper" *ngIf="operador">
  <div class="detalle-page-header">
    <div>
      <h1 class="admin-title">Detalle del Operador</h1>
      <p class="admin-subtitle">Información completa del operador</p>
    </div>
    <div class="header-actions">
      <button class="btn-edit" (click)="editar()">✏ Editar</button>
      <button class="btn-delete" (click)="eliminar()">🗑 Eliminar</button>
      <a class="btn-back" routerLink="/operadores">← Volver</a>
    </div>
  </div>

  <section class="detalle-section">
    <app-operador-detalle [seleccionado]="operador"></app-operador-detalle>
  </section>
</div>
