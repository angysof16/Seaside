<div class="auth-hero">
  <div class="auth-hero-overlay"></div>
  <div class="auth-hero-content">
    <h1 class="auth-hero-title">Portal Operadores</h1>
  </div>
  <div class="hero-wave">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,60 C360,120 1080,0 1440,60 L1440,120 L0,120 Z" />
    </svg>
  </div>
</div>

<main class="auth-main">
  <div class="auth-card">

    <div class="auth-alert auth-error" *ngIf="error">{{ error }}</div>

    <h2 class="auth-title">Acceso Operario</h2>
    <p class="auth-subtitle">Ingresa con tus credenciales de operador</p>

    <form class="auth-form" (ngSubmit)="onLogin()" #loginForm="ngForm">

      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          [(ngModel)]="usuario"
          placeholder="nombre_usuario"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input
          type="password"
          id="contrasena"
          name="contrasena"
          [(ngModel)]="contrasena"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="auth-btn" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Ingresando...' : 'Ingresar al Portal' }}
      </button>

    </form>

    <p class="auth-switch">
      <a routerLink="/">← Volver al sitio principal</a>
    </p>

  </div>
</main>
