<div class="form-page-wrapper">
    <div class="form-page-header">
        <div>
            <h1 class="admin-title">{{ modoEdicion ? 'Editar Domiciliario' : 'Nuevo Domiciliario' }}</h1>
            <p class="admin-subtitle">
                {{ modoEdicion ? 'Modifica los datos del domiciliario' : 'Registra un nuevo repartidor' }}
            </p>
        </div>
        <a class="btn-back" routerLink="/admin/domiciliarios">← Volver</a>
    </div>

    <section class="form-section">
        <div class="auth-alert auth-error" *ngIf="error">{{ error }}</div>

        <form class="form-grid" (ngSubmit)="guardar()" #f="ngForm">

            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" name="nombre" [(ngModel)]="form.nombre" required placeholder="Nombre" />
            </div>

            <div class="form-group">
                <label>Apellido *</label>
                <input type="text" name="apellido" [(ngModel)]="form.apellido" required placeholder="Apellido" />
            </div>

            <div class="form-group">
                <label>Correo *</label>
                <input type="email" name="correo" [(ngModel)]="form.correo" required placeholder="correo@ejemplo.com" />
            </div>

            <div class="form-group">
                <label>Teléfono *</label>
                <input type="tel" name="telefono" [(ngModel)]="form.telefono" required placeholder="310 000 0000" />
            </div>

            <div class="form-group full-width">
                <label>Dirección *</label>
                <input type="text" name="direccion" [(ngModel)]="form.direccion" required
                    placeholder="Calle 1 # 2-3, Bogotá" />
            </div>

            <div class="form-group">
                <label>Cédula *</label>
                <input type="text" name="cedula" [(ngModel)]="form.cedula" required placeholder="1234567890" />
            </div>

            <!-- Contraseña solo al crear -->
            <div class="form-group" *ngIf="!modoEdicion">
                <label>Contraseña *</label>
                <input type="password" name="contrasena" [(ngModel)]="form.contrasena" [required]="!modoEdicion"
                    placeholder="Contraseña inicial" />
            </div>

            <div class="form-group checkbox-group full-width">
                <label class="checkbox-label">
                    <input type="checkbox" name="activo" [(ngModel)]="form.activo" />
                    <span>Activo (trabaja hoy)</span>
                </label>
            </div>

            <div class="form-actions full-width">
                <button type="submit" class="btn-submit" [disabled]="f.invalid">
                    {{ modoEdicion ? '✓ Actualizar' : '+ Guardar' }}
                </button>
                <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
            </div>

        </form>
    </section>
</div>
