<div class="form-page-wrapper">

  <div class="form-page-header">
    <div>
      <h1 class="admin-title">{{ modoEdicion ? 'Editar Producto' : 'Nuevo Producto' }}</h1>
      <p class="admin-subtitle">{{ modoEdicion ? 'Modifica los datos del producto' : 'Completa los datos para agregar un plato al menú' }}</p>
    </div>
    <a class="btn-back" routerLink="/productos">← Volver a productos</a>
  </div>

  <section class="form-section">
    <app-producto-form
      [productoEditar]="productoEditar"
      (addProductoEvent)="onGuardar($event)"
      (updateProductoEvent)="onActualizar($event)"
      (cancelarEvent)="onCancelar()"
    ></app-producto-form>
  </section>

</div>
